<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LEGENDA | Nobu Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* GLOBAL LIGHT */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 20%, rgba(201,162,78,0.10), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 45%);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 8%;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=2000&q=80");
  background-size:cover;
  background-position:center;
  filter:brightness(0.35);
  transform:scale(1.1);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{
  font-family:"Playfair Display";
  font-size:72px;
  color:#C9A24E;
  margin:0;
}

.hero p{
  max-width:420px;
  opacity:0.75;
}

/* BURGER */
.burger{
  position:fixed;
  top:18px;
  left:18px;
  z-index:999;
  cursor:pointer;
}
.burger div{
  width:26px;
  height:2px;
  background:white;
  margin:5px 0;
}

/* MENU */
.panel{
  position:fixed;
  top:0;
  left:-320px;
  width:280px;
  height:100%;
  background:rgba(10,10,10,0.75);
  backdrop-filter:blur(16px);
  padding:70px 25px;
  transition:0.5s;
  z-index:998;
}
.panel a{
  display:block;
  color:white;
  text-decoration:none;
  padding:14px 0;
  font-size:13px;
}

/* SECTION */
.section{
  padding:90px 8%;
}

/* TITLE */
.title{
  font-family:"Playfair Display";
  font-size:40px;
  text-align:center;
  color:#C9A24E;
  margin-bottom:35px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  padding:24px;
  border-radius:18px;
  cursor:pointer;
  transition:0.4s;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#C9A24E;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#0b0b0b;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#C9A24E;
  border:none;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-box{
  width:90%;
  max-width:420px;
  background:rgba(20,20,20,0.9);
  padding:24px;
  border-radius:18px;
  max-height:90vh;
  overflow-y:auto;
}

.close{
  float:right;
  cursor:pointer;
  color:#C9A24E;
}
</style>
</head>

<body>

<div class="burger" onclick="toggleMenu()">
  <div></div><div></div><div></div>
</div>

<div class="panel" id="panel">
  <a href="#booking">RESERVATION</a>
</div>

<section class="hero">
  <div class="hero-content">
    <h1>LEGENDA</h1>
    <p>Nobu-Level Dining Experience</p>
  </div>
</section>

<section class="section">
<div class="grid">

  <div class="card" onclick="openModal('main')">
    <h2>Банкетный зал</h2>
  </div>

  <div class="card" onclick="openModal('bar')">
    <h2>Основное меню</h2>
  </div>

  <div class="card" onclick="openModal('private')">
    <h2>Барное меню</h2>
  </div>

</div>
</section>

<section id="booking" class="section">

<div class="title">Reservation</div>

<input id="name" placeholder="Name">
<input id="time" type="datetime-local">
<input id="people" type="number" placeholder="Guests">

<button onclick="book()">Confirm Booking</button>
<button onclick="send()">WhatsApp</button>

<p id="result"></p>

</section>

<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✕</span>
    <h2 id="mTitle"></h2>
    <p id="mText"></p>
<img id="mImage" style="width:100%; display:none; margin-top:10px; border-radius:12px;" />
  </div>
</div>

<script>

function toggleMenu(){
  let p=document.getElementById("panel");
  p.style.left = p.style.left==="0px"?"-320px":"0px";
}

/* FIXED MODAL */
function openModal(type){

  document.getElementById("modal").style.display="flex";

  let mTitle = document.getElementById("mTitle");
  let mText = document.getElementById("mText");
  let mImage = document.getElementById("mImage");

  // сброс
  mImage.style.display = "none";
  mText.style.display = "block";

  if(type === "main"){
    mTitle.innerText = "Банкетный зал";
    mText.innerText = "Luxury events & celebrations";
  }

  if(type === "bar"){
    mTitle.innerText = "Основное меню";

    // скрываем текст
    mText.style.display = "none";

    // показываем картинку
    mImage.style.display = "block";

    // 👇 СЮДА ВСТАВЬ СВОЮ КАРТИНКУ
    mImage.src = "menu.jpg";
  }

  if(type === "private"){
    mTitle.innerText = "Барное меню";
    mText.innerText = "Cocktails & premium drinks";
  }
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* BOOKING */
function book(){
  let n=document.getElementById("name").value;
  let t=document.getElementById("time").value;
  let p=document.getElementById("people").value;

  document.getElementById("result").innerText=
  `Confirmed: ${n} | ${t} | ${p}`;
}

function send(){
  window.open("https://wa.me/79995542807");
}

/* SHOW CARDS ALWAYS */
window.addEventListener('load',()=>{
  document.querySelectorAll('.card').forEach(c=>{
    c.style.opacity="1";
  });
});

</script>

</body>
</html>
